<!-- @dsCard group="Components" viewport="700x320" name="Card & DataTable" subtitle="Surfaces and the inventory list table" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-app); font-family: var(--font-sans); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, DataTable, Button, Badge } = window.StockiaDesignSystem_235f53;
  const products = [
    { id: 1, name: 'Coca-Cola 500ml', sku: 'CC-500', price: 0.75, stock: 124, min: 20 },
    { id: 2, name: 'Pan francés', sku: 'PAN-FR', price: 0.15, stock: 8, min: 30 },
    { id: 3, name: 'Café molido 250g', sku: 'CAFE-250', price: 3.20, stock: 46, min: 10 },
  ];
  function Demo() {
    return (
      <DataTable
        header={<><strong style={{ color: 'var(--text-strong)' }}>Productos</strong><Button leadingIcon="＋">Nuevo producto</Button></>}
        columns={[
          { key: 'id', header: 'ID' },
          { key: 'name', header: 'Nombre' },
          { key: 'sku', header: 'SKU' },
          { header: 'Precio', align: 'right', render: r => `$${r.price.toFixed(2)}` },
          { header: 'Stock', align: 'right', render: r => r.stock <= r.min ? <Badge tone="danger">{r.stock} ⚠</Badge> : r.stock },
          { header: '', align: 'right', render: () => <Button variant="ghost" size="sm">Editar</Button> },
        ]}
        rows={products}
        rowKey="id"
      />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
