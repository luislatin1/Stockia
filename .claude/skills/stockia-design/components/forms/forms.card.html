<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-app); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 640px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Field, Input, Select, Checkbox } = window.StockiaDesignSystem_235f53;
  function Demo() {
    return (
      <div className="grid">
        <Field label="Nombre del producto" htmlFor="n" required>
          <Input id="n" defaultValue="Coca-Cola 500ml" />
        </Field>
        <Field label="SKU" htmlFor="s" hint="Único por almacén">
          <Input id="s" placeholder="Escanea o escribe" />
        </Field>
        <Field label="Comprobante" htmlFor="d">
          <Select id="d">
            <option>Ticket</option>
            <option>Factura</option>
          </Select>
        </Field>
        <Field label="Precio" htmlFor="p" error="Ingresa un monto válido">
          <Input id="p" type="number" defaultValue="-1" invalid />
        </Field>
        <div style={{ gridColumn: '1 / -1', display: 'flex', gap: '20px', alignItems: 'center' }}>
          <Checkbox label="Recordarme" defaultChecked />
          <Checkbox label="Producto inactivo" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
