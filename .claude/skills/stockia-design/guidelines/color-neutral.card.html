<!-- @dsCard group="Colors" viewport="700x180" name="Neutral — Gray" subtitle="Surfaces, text, borders, the dark sidebar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 52px; border-radius: var(--radius-sm); border: 1px solid rgb(0 0 0 / 0.06); }
  .name { margin-top: 5px; font-size: 10px; font-weight: var(--weight-semibold); color: var(--text-strong); }
  .val { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="name">50</div><div class="val">f9fafb</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="name">100 · app bg</div><div class="val">f3f4f6</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="name">200 · border</div><div class="val">e5e7eb</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="name">300 · input</div><div class="val">d1d5db</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="name">400</div><div class="val">9ca3af</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="name">500 · muted</div><div class="val">6b7280</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-600)"></div><div class="name">600</div><div class="val">4b5563</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="name">700 · body</div><div class="val">374151</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-800)"></div><div class="name">800</div><div class="val">1f2937</div></div>
  <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="name">900 · sidebar</div><div class="val">111827</div></div>
</div>
</body>
</html>
