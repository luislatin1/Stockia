<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="From 12px UI text to 30px page titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-strong); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .tag { width: 130px; flex-shrink: 0; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="line"><span class="tag">3xl · 30 / bold</span><span style="font-size:var(--text-3xl);font-weight:700">Resumen del cajero</span></div>
<div class="line"><span class="tag">2xl · 24 / bold</span><span style="font-size:var(--text-2xl);font-weight:700">$1,240.00</span></div>
<div class="line"><span class="tag">xl · 20 / semibold</span><span style="font-size:var(--text-xl);font-weight:600">Punto de Venta</span></div>
<div class="line"><span class="tag">lg · 18 / semibold</span><span style="font-size:var(--text-lg);font-weight:600">Últimas ventas</span></div>
<div class="line"><span class="tag">base · 16 / regular</span><span style="font-size:var(--text-base)">Texto de cuerpo estándar</span></div>
<div class="line"><span class="tag">sm · 14 / regular</span><span style="font-size:var(--text-sm)">Texto de interfaz por defecto</span></div>
<div class="line"><span class="tag">xs · 12 / semibold ↑</span><span style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:var(--tracking-wide);color:var(--text-muted)">Total vendido</span></div>
</body>
</html>
