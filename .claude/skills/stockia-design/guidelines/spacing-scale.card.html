<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base — cells 12, cards 16, gutters 24" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--indigo-500); border-radius: 2px; width: 100%; }
  .t { margin-top: 6px; font-size: 11px; font-family: var(--font-mono); color: var(--text-strong); }
  .s { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="item" style="width:24px"><div class="bar" style="height:4px"></div><div class="t">1</div><div class="s">4</div></div>
  <div class="item" style="width:28px"><div class="bar" style="height:8px"></div><div class="t">2</div><div class="s">8</div></div>
  <div class="item" style="width:34px"><div class="bar" style="height:12px"></div><div class="t">3</div><div class="s">12</div></div>
  <div class="item" style="width:40px"><div class="bar" style="height:16px"></div><div class="t">4</div><div class="s">16</div></div>
  <div class="item" style="width:46px"><div class="bar" style="height:20px"></div><div class="t">5</div><div class="s">20</div></div>
  <div class="item" style="width:52px"><div class="bar" style="height:24px"></div><div class="t">6</div><div class="s">24</div></div>
  <div class="item" style="width:60px"><div class="bar" style="height:32px"></div><div class="t">8</div><div class="s">32</div></div>
  <div class="item" style="width:68px"><div class="bar" style="height:48px"></div><div class="t">12</div><div class="s">48</div></div>
</div>
</body>
</html>
