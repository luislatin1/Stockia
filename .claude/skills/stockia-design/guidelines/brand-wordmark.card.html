<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Text identity — the 'Sistema' eyebrow lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); }
  .wrap { display: flex; height: 150px; }
  .dark { flex: 1; background: var(--surface-sidebar); display: flex; align-items: center; padding: 0 28px; gap: 14px; }
  .mark { height: 40px; width: 40px; border-radius: var(--radius-md); background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 22px; }
  .eyebrow { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--gray-400); }
  .name { font-size: var(--text-xl); font-weight: 700; color: #fff; line-height: 1.1; }
  .light { flex: 1; background: var(--surface-card); display: flex; align-items: center; justify-content: center; }
  .lname { font-size: 30px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.01em; }
  .lname b { color: var(--primary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="dark">
    <div class="mark">S</div>
    <div><div class="eyebrow">Sistema</div><div class="name">Stockia POS</div></div>
  </div>
  <div class="light"><div class="lname">Stock<b>ia</b></div></div>
</div>
</body>
</html>
