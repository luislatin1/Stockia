<!-- @dsCard group="Brand" viewport="700x200" name="Icon vocabulary" subtitle="Stockia uses emoji as nav iconography" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: var(--radius-md); background: var(--surface-sunken); }
  .ico { font-size: 22px; }
  .lab { font-size: 10px; color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><span class="ico">📊</span><span class="lab">Dashboard</span></div>
  <div class="cell"><span class="ico">🛒</span><span class="lab">Punto de Venta</span></div>
  <div class="cell"><span class="ico">🗃️</span><span class="lab">Ventas</span></div>
  <div class="cell"><span class="ico">📝</span><span class="lab">Cotizaciones</span></div>
  <div class="cell"><span class="ico">💹</span><span class="lab">Resumen POS</span></div>
  <div class="cell"><span class="ico">💸</span><span class="lab">Mov. Caja</span></div>
  <div class="cell"><span class="ico">📦</span><span class="lab">Productos</span></div>
  <div class="cell"><span class="ico">🏷</span><span class="lab">Categorías</span></div>
  <div class="cell"><span class="ico">🔄</span><span class="lab">Movimientos</span></div>
  <div class="cell"><span class="ico">🧾</span><span class="lab">Clientes DTE</span></div>
  <div class="cell"><span class="ico">🧩</span><span class="lab">Panel DTE</span></div>
  <div class="cell"><span class="ico">👤</span><span class="lab">Usuarios</span></div>
  <div class="cell"><span class="ico">💱</span><span class="lab">Monedas</span></div>
  <div class="cell"><span class="ico">⚙️</span><span class="lab">Configuración</span></div>
  <div class="cell"><span class="ico">🔁</span><span class="lab">Cambiar Almacén</span></div>
  <div class="cell"><span class="ico">🔓</span><span class="lab">Abrir Caja</span></div>
  <div class="cell"><span class="ico">🔒</span><span class="lab">Cerrar Caja</span></div>
  <div class="cell"><span class="ico">🚪</span><span class="lab">Cerrar Sesión</span></div>
</div>
</body>
</html>
