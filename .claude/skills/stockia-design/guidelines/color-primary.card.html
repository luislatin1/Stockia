<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Indigo" subtitle="Buttons, links, active nav, focus rings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgb(0 0 0 / 0.06); }
  .name { margin-top: 6px; font-size: var(--text-xs); font-weight: var(--weight-semibold); color: var(--text-strong); }
  .val { font-size: var(--text-xs); color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--indigo-50)"></div><div class="name">indigo-50</div><div class="val">#eef2ff</div></div>
  <div class="sw"><div class="chip" style="background:var(--indigo-100)"></div><div class="name">indigo-100</div><div class="val">#e0e7ff</div></div>
  <div class="sw"><div class="chip" style="background:var(--indigo-500)"></div><div class="name">indigo-500 · ring</div><div class="val">#6366f1</div></div>
  <div class="sw"><div class="chip" style="background:var(--indigo-600)"></div><div class="name">indigo-600 · primary</div><div class="val">#4f46e5</div></div>
  <div class="sw"><div class="chip" style="background:var(--indigo-700)"></div><div class="name">indigo-700 · hover</div><div class="val">#4338ca</div></div>
</div>
</body>
</html>
