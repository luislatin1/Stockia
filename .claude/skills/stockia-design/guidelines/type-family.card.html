<!-- @dsCard group="Type" viewport="700x160" name="Typeface — Figtree" subtitle="The single brand sans, weights 400–700" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-strong); }
  .big { font-size: 44px; font-weight: var(--weight-bold); letter-spacing: -0.01em; line-height: 1; }
  .weights { display: flex; gap: 24px; margin-top: 16px; }
  .w span { display: block; font-size: 22px; }
  .w small { font-size: var(--text-xs); color: var(--text-muted); }
</style>
</head>
<body>
<div class="big">Stockia POS</div>
<div class="weights">
  <div class="w"><span style="font-weight:400">Aa Gg 0123</span><small>Regular · 400</small></div>
  <div class="w"><span style="font-weight:500">Aa Gg 0123</span><small>Medium · 500</small></div>
  <div class="w"><span style="font-weight:600">Aa Gg 0123</span><small>Semibold · 600</small></div>
  <div class="w"><span style="font-weight:700">Aa Gg 0123</span><small>Bold · 700</small></div>
</div>
</body>
</html>
